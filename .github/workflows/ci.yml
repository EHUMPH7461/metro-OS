name: CI
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Pin npm
        run: npm install --global npm@11.16.0 --no-audit --no-fund
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
